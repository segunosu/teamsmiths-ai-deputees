<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Teamsmiths · AMPLIFY — AI Governance &amp; Performance Command Centre</title>

<style>
/* ============================================================
   TEAMSMITHS AMPLIFY — Command Centre
   Self-contained single-file app. Design system below.
   ============================================================ */
:root{
  --navy:#0b1f3a; --navy-2:#13294b; --indigo:#1f3d6e; --slate:#334155;
  --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --line-2:#cbd5e1;
  --bg:#f4f6fb; --panel:#ffffff; --panel-2:#f8fafc;
  --accent:#0ea5a4; --accent-2:#14b8a6; --brand:#2563eb; --brand-2:#1d4ed8;
  --green:#16a34a; --green-bg:#dcfce7; --amber:#d97706; --amber-bg:#fef3c7;
  --red:#dc2626; --red-bg:#fee2e2; --purple:#7c3aed; --purple-bg:#ede9fe;
  --radius:12px; --radius-sm:8px; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.06);
  --shadow-lg:0 10px 30px rgba(15,23,42,.12);
  --sans:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px}

/* ---------- Password gate ---------- */
#gate{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,var(--navy),var(--indigo));display:flex;align-items:center;justify-content:center}
#gate .card{background:var(--panel);border-radius:16px;box-shadow:var(--shadow-lg);padding:40px;width:380px;max-width:92vw;text-align:center}
#gate .logo{font-weight:800;font-size:22px;letter-spacing:.5px;color:var(--navy)}
#gate .logo span{color:var(--accent)}
#gate .sub{color:var(--muted);font-size:12.5px;margin:6px 0 24px}
#gate input{width:100%;padding:12px 14px;border:1px solid var(--line-2);border-radius:10px;font-size:15px;text-align:center;letter-spacing:2px}
#gate input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
#gate button{margin-top:14px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--brand);color:#fff;font-weight:600;font-size:15px;cursor:pointer}
#gate button:hover{background:var(--brand-2)}
#gate .err{color:var(--red);font-size:12.5px;height:16px;margin-top:10px}
#gate .hint{color:var(--muted);font-size:11px;margin-top:18px}

/* ---------- App layout ---------- */
#app{display:none;min-height:100vh}
.layout{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--navy);color:#cdd9ee;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .mark{font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px}
.brand .mark span{color:var(--accent-2)}
.brand .tag{font-size:10px;color:#7e93b8;letter-spacing:1.5px;text-transform:uppercase}
.nav-group{padding:12px 12px 4px}
.nav-group .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#5f76a0;padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:#c3d0e8;font-size:13.5px;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--brand);color:#fff;font-weight:600}
.nav-item .ico{width:18px;text-align:center;font-size:14px;opacity:.9}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar .crumb{font-size:12.5px;color:var(--muted)}
.topbar h1{font-size:18px;margin:2px 0 0}
.topbar .actions{display:flex;gap:10px;align-items:center}
.content{padding:24px 28px 60px;max-width:1280px;width:100%}

/* ---------- Reusable UI ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:9px;border:1px solid var(--line-2);background:var(--panel);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-2);color:#fff}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--brand);background:var(--panel-2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .hd{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.card .hd h3{margin:0;font-size:15px}
.card .hd .desc{font-size:12px;color:var(--muted);margin-top:2px}
.card .bd{padding:18px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto}}

.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi .k-label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi .k-val{font-size:26px;font-weight:800;margin-top:6px;color:var(--ink)}
.kpi .k-sub{font-size:12px;color:var(--muted);margin-top:4px}
.kpi .k-val.sm{font-size:20px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line);font-weight:600;background:var(--panel-2)}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:var(--panel-2)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)} .b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)} .b-grey{background:#eef2f7;color:var(--slate)}
.b-blue{background:#dbeafe;color:var(--brand-2)} .b-purple{background:var(--purple-bg);color:var(--purple)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot.g{background:var(--green)}.dot.a{background:var(--amber)}.dot.r{background:var(--red)}

.pill-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.pill-tabs .pt{padding:7px 14px;border-radius:20px;border:1px solid var(--line-2);background:var(--panel);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--slate)}
.pill-tabs .pt.active{background:var(--navy);border-color:var(--navy);color:#fff}

.bar{height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.bar > i{display:block;height:100%;border-radius:6px}
.score-ring{--p:0;width:84px;height:84px;border-radius:50%;background:conic-gradient(var(--c,var(--brand)) calc(var(--p)*1%),var(--line) 0);display:flex;align-items:center;justify-content:center}
.score-ring .inner{width:62px;height:62px;border-radius:50%;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .inner b{font-size:18px} .score-ring .inner small{font-size:9px;color:var(--muted)}

label.fld{display:block;margin-bottom:14px}
label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:5px}
input.in,select.in,textarea.in{width:100%;padding:9px 11px;border:1px solid var(--line-2);border-radius:8px;font-size:13.5px;font-family:inherit;background:var(--panel)}
input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
textarea.in{min-height:74px;resize:vertical}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:var(--panel);border-radius:14px;box-shadow:var(--shadow-lg);width:640px;max-width:96vw;animation:pop .15s ease}
@keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
.modal .m-hd{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .m-hd h3{margin:0;font-size:16px}
.modal .m-bd{padding:22px;max-height:64vh;overflow-y:auto}
.modal .m-ft{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;border:none;background:none}

.review-flag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.rf-ai{background:var(--purple-bg);color:var(--purple)} .rf-draft{background:#e2e8f0;color:var(--slate)}
.rf-review{background:var(--amber-bg);color:var(--amber)} .rf-approved{background:var(--green-bg);color:var(--green)}

.empty{text-align:center;padding:46px;color:var(--muted)}
.empty .ico{font-size:32px;opacity:.4}
.note{background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--slate)}
.note.warn{border-left-color:var(--amber)}
.hl{background:#fff8e1;padding:0 3px;border-radius:3px}
.muted{color:var(--muted)} .right{text-align:right} .center{text-align:center}
.flex{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.mt{margin-top:16px}.mt8{margin-top:8px}.mb{margin-bottom:16px} .nowrap{white-space:nowrap}
.tiny{font-size:11px} .b{font-weight:700} .sb{font-weight:600}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:24px 0 12px;font-weight:700}
.stepper{display:flex;gap:0;margin-bottom:24px}
.stepper .st{flex:1;text-align:center;font-size:11.5px;color:var(--muted);padding-bottom:10px;border-bottom:3px solid var(--line);font-weight:600}
.stepper .st.active{color:var(--brand);border-bottom-color:var(--brand)}
.stepper .st.done{color:var(--green);border-bottom-color:var(--green)}
.chip{display:inline-block;padding:4px 10px;border-radius:7px;background:var(--panel-2);border:1px solid var(--line);font-size:12px;margin:0 6px 6px 0}
.report-doc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:38px 44px;max-width:860px;margin:0 auto;line-height:1.6}
.report-doc h1{font-size:24px;margin:0 0 4px} .report-doc h2{font-size:16px;margin:26px 0 8px;color:var(--navy);border-bottom:2px solid var(--line);padding-bottom:5px}
.report-doc h3{font-size:13.5px;margin:16px 0 6px}
.report-doc .meta{color:var(--muted);font-size:12px;margin-bottom:20px}
@media print{.sidebar,.topbar,.no-print{display:none!important}.content{padding:0}.report-doc{border:none}}
</style>
</head>
<body>

<!-- ============ PASSWORD GATE ============ -->
<div id="gate">

</div>

<div id="modalRoot"></div>

<script>

// Auto-on when the library + config are present. Set to false to force offline/demo mode.
const USE_SUPABASE = !!(typeof window!=='undefined' && window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY);
let sb = USE_SUPABASE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

function renderGate(){
  const inner=document.getElementById('gateInner');const hint=document.getElementById('gateHint');
  if(false){ // gate is always the access code (shared Supabase session must NOT auto-admit)
    inner.innerHTML='<input id="gateEmail" type="email" placeholder="you@teamsmiths.com" autocomplete="email" /><button onclick="sendMagicLink()">Email me a secure sign-in link</button>';

async function sendMagicLink(){
  const email=(document.getElementById('gateEmail').value||'').trim();const err=document.getElementById('gateErr');
  if(!email){err.style.color='var(--red)';err.textContent='Enter your email.';return;}
  err.style.color='var(--muted)';err.textContent='Sending…';
  try{
    const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('#')[0]}});
    if(error){err.style.color='var(--red)';err.textContent=error.message;}
    else{document.getElementById('gateInner').innerHTML='<div style="font-size:14px;color:var(--green);font-weight:700">✓ Check your inbox</div><div class="tiny muted" style="margin-top:6px">Open the link on this device to sign in.</div>';err.textContent='';}
  }catch(e){err.style.color='var(--red)';err.textContent='Could not reach the backend.';}
}
function tryGate(){
  const v=document.getElementById('gatePw').value.trim();
  if(v===ACCESS_CODE){sessionStorage.setItem('ts_amplify_auth','1');showApp();}
  else{document.getElementById('gateErr').style.color='var(--red)';document.getElementById('gateErr').textContent='Incorrect access code.';document.getElementById('gatePw').select();}
}
function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}

/* ============================================================
   1. SEED DATA — frameworks, requirements, mappings + 3 clients
   ============================================================ */
// Deterministic RNG so first-run seed is stable
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let _rng=mulberry32(20260618);
const rnd=(a,b)=>Math.floor(_rng()*(b-a+1))+a;
const pick=arr=>arr[Math.floor(_rng()*arr.length)];
const uid=p=>p+"_"+Math.random().toString(36).slice(2,8);

  {framework_id:"fw_euaiact",framework_name:"EU AI Act",version:"Reg. (EU) 2024/1689",jurisdiction:"EU",framework_type:"Regulation",active_flag:true},

  {framework_id:"fw_iso27001",framework_name:"ISO/IEC 27001",version:"2022",jurisdiction:"International",framework_type:"Management System",active_flag:true},

  {framework_id:"fw_soc2",framework_name:"SOC 2 (readiness)",version:"TSC 2017",jurisdiction:"US",framework_type:"Attestation",active_flag:true}
];

// Curated requirement library (reference + summary + domain + what evidence/control is needed)
const REQUIREMENTS=[
  // EU AI Act
  {requirement_id:"euai_1",framework_id:"fw_euaiact",requirement_reference:"Art. 9",requirement_title:"Risk management system",requirement_summary:"Establish, document and maintain a risk management system across the AI lifecycle for high-risk systems.",risk_domain:"operational",evidence_needed:"AI risk register, lifecycle risk procedure",control_needed:"AI risk management process",priority:"High"},
  {requirement_id:"euai_2",framework_id:"fw_euaiact",requirement_reference:"Art. 10",requirement_title:"Data & data governance",requirement_summary:"Training, validation and testing data sets meet quality criteria; governance of data and bias examination.",risk_domain:"data quality",evidence_needed:"Data governance policy, dataset documentation",control_needed:"Data quality & bias controls",priority:"High"},
  {requirement_id:"euai_3",framework_id:"fw_euaiact",requirement_reference:"Art. 11/12",requirement_title:"Technical documentation & logging",requirement_summary:"Maintain technical documentation and automatic event logging enabling traceability.",risk_domain:"transparency",evidence_needed:"Technical file, logging configuration",control_needed:"Record-keeping & logging",priority:"Medium"},
  {requirement_id:"euai_4",framework_id:"fw_euaiact",requirement_reference:"Art. 13",requirement_title:"Transparency to users",requirement_summary:"Provide clear instructions and information enabling deployers to interpret and use output appropriately.",risk_domain:"transparency",evidence_needed:"User instructions, transparency notice",control_needed:"Transparency control",priority:"Medium"},
  {requirement_id:"euai_5",framework_id:"fw_euaiact",requirement_reference:"Art. 14",requirement_title:"Human oversight",requirement_summary:"Design and implement effective human oversight measures appropriate to the risk.",risk_domain:"human oversight",evidence_needed:"Human oversight procedure",control_needed:"Human-in-the-loop control",priority:"High"},
  {requirement_id:"euai_6",framework_id:"fw_euaiact",requirement_reference:"Art. 15",requirement_title:"Accuracy, robustness & cybersecurity",requirement_summary:"Achieve appropriate levels of accuracy, robustness and cybersecurity over the lifecycle.",risk_domain:"security",evidence_needed:"Accuracy metrics, security testing",control_needed:"Robustness & security testing",priority:"High"},
  {requirement_id:"euai_7",framework_id:"fw_euaiact",requirement_reference:"Art. 26",requirement_title:"Deployer obligations",requirement_summary:"Use systems per instructions, assign human oversight, monitor operation and keep logs.",risk_domain:"legal",evidence_needed:"Deployer responsibility matrix",control_needed:"Deployer operating procedure",priority:"Medium"},
  // ISO 42001
  {requirement_id:"iso42_1",framework_id:"fw_iso42001",requirement_reference:"Cl. 4",requirement_title:"Context of the organisation",requirement_summary:"Determine internal/external issues and interested parties relevant to the AI management system.",risk_domain:"operational",evidence_needed:"Context analysis, stakeholder map",control_needed:"AIMS scoping",priority:"Medium"},
  {requirement_id:"iso42_2",framework_id:"fw_iso42001",requirement_reference:"Cl. 5",requirement_title:"Leadership & AI policy",requirement_summary:"Top management commitment and an approved AI policy aligned to objectives.",risk_domain:"operational",evidence_needed:"AI policy, leadership minutes",control_needed:"AI governance policy",priority:"High"},
  {requirement_id:"iso42_3",framework_id:"fw_iso42001",requirement_reference:"Cl. 6.1",requirement_title:"Actions to address risks & opportunities",requirement_summary:"AI risk assessment and AI risk treatment process established.",risk_domain:"operational",evidence_needed:"AI risk assessment method",control_needed:"AI risk management process",priority:"High"},
  {requirement_id:"iso42_4",framework_id:"fw_iso42001",requirement_reference:"Cl. 6.1.4",requirement_title:"AI system impact assessment",requirement_summary:"Assess impacts of AI systems on individuals and society.",risk_domain:"bias",evidence_needed:"AI impact assessment (AIA)",control_needed:"Impact assessment control",priority:"High"},
  {requirement_id:"iso42_5",framework_id:"fw_iso42001",requirement_reference:"Cl. 7",requirement_title:"Resources, competence & awareness",requirement_summary:"Ensure competence, awareness and documented information for the AIMS.",risk_domain:"operational",evidence_needed:"Training records, competence matrix",control_needed:"Competence & training control",priority:"Medium"},

let DB=null;
// dynamic (per-client) tables synced to Supabase. Reference tables (frameworks,
// requirements, mappings, prompts) come from the in-file constants.
const SYNC_TABLES=[['clients','client_id'],['engagements','engagement_id'],['ai_systems','ai_system_id'],['use_cases','use_case_id'],['risks','risk_id'],['controls','control_id'],['evidence','evidence_id'],['actions','action_id'],['reports','report_id'],['assessments','assessment_id']];
const NUMERIC_FIELDS=['size_num','commercial_value','users_count','estimated_hours_saved_monthly','estimated_financial_value_monthly','likelihood','impact','risk_score','readiness_score'];
function coerce(rows){rows.forEach(r=>NUMERIC_FIELDS.forEach(f=>{if(r[f]!==null&&r[f]!==undefined&&r[f]!=='')r[f]=Number(r[f]);}));return rows;}

async function loadDB(){
  if(USE_SUPABASE && sb){
    try{
      DB={frameworks:FRAMEWORKS,requirements:REQUIREMENTS,mappings:MAPPINGS,prompts:PROMPTS,proposals:[]};
      let empty=true;
      for(const [key,pk] of SYNC_TABLES){
        const {data,error}=await sb.from('amplify_'+key).select('*');
        if(error)throw error;
        DB[key]=coerce(data||[]);
        if(key==='clients'&&DB[key].length)empty=false;
      }
      if(empty)await seedSupabase();
      return;
    }catch(e){console.error('Supabase load failed; using local data.',e);toast('Backend unavailable — using local data');}
  }
  try{const raw=localStorage.getItem(STORE_KEY);if(raw){DB=JSON.parse(raw);return;}}catch(e){}
  DB=buildSeed();saveLocal();
}
async function seedSupabase(){
  const seed=buildSeed();
  DB={frameworks:FRAMEWORKS,requirements:REQUIREMENTS,mappings:MAPPINGS,prompts:PROMPTS,proposals:[]};
  for(const [key,pk] of SYNC_TABLES){
    DB[key]=seed[key]||[];
    if(DB[key].length){const {error}=await sb.from('amplify_'+key).upsert(DB[key],{onConflict:pk});if(error)console.error('seed '+key,error);}
  }
  toast('Loaded demo data into your backend');
}
function saveLocal(){try{localStorage.setItem(STORE_KEY,JSON.stringify(DB));}catch(e){}}
let _saveTimer=null,_dirty=new Set();
function saveDB(tableKey){
  if(tableKey)_dirty.add(tableKey);
  if(USE_SUPABASE&&sb){clearTimeout(_saveTimer);_saveTimer=setTimeout(flushSupabase,400);}
  else saveLocal();
}
async function flushSupabase(){
  const keys=_dirty.size?[..._dirty]:SYNC_TABLES.map(t=>t[0]);_dirty.clear();
  for(const key of keys){
    const pk=(SYNC_TABLES.find(t=>t[0]===key)||[])[1];if(!pk)continue;
    const rows=DB[key]||[];
    if(rows.length){const {error}=await sb.from('amplify_'+key).upsert(rows,{onConflict:pk});if(error)console.error('save '+key,error);}
  }
}
async function syncDelete(key,pk,id){if(USE_SUPABASE&&sb){const {error}=await sb.from('amplify_'+key).delete().eq(pk,id);if(error)console.error('delete '+key,error);}}
function resetDB(){
  if(!confirm("Reset all data back to the seeded demo state? This rewrites the Amplify tables."))return;
  (async()=>{
    if(USE_SUPABASE&&sb){for(const [key,pk] of SYNC_TABLES){await sb.from('amplify_'+key).delete().neq(pk,'__never__');}await seedSupabase();}
    else{localStorage.removeItem(STORE_KEY);DB=buildSeed();saveLocal();}
    toast('Data reset to demo state');navigate('dashboard');
  })();
}

const money=n=>'£'+Math.round(n).toLocaleString('en-GB');
const moneyK=n=>n>=1000?'£'+(n/1000).toFixed(n>=100000?0:1)+'k':'£'+n;
const fmtDate=d=>{if(!d)return'—';const x=new Date(d);return x.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});};
const daysTo=d=>Math.round((new Date(d)-_today)/86400000);
function scoreColor(p){return p>=70?'var(--green)':p>=40?'var(--amber)':'var(--red)';}
function rag(p){return p>=70?'g':p>=40?'a':'r';}
function ragBadge(p,labelG,labelA,labelR){const r=rag(p);const m={g:['b-green',labelG||'On track'],a:['b-amber',labelA||'Needs work'],r:['b-red',labelR||'At risk']}[r];return `<span class="badge ${m[0]}">${m[1]}</span>`;}
function riskBadge(score){const c=score>=15?'b-red':score>=8?'b-amber':'b-grey';const l=score>=15?'High':score>=8?'Medium':'Low';return `<span class="badge ${c}">${l} · ${score}</span>`;}
function statusBadge(s){const m={'Done':'b-green','Implemented':'b-green','Approved':'b-green','Mitigated':'b-green','Received':'b-blue','Generated':'b-purple','In progress':'b-amber','In treatment':'b-amber','In review':'b-amber','In delivery':'b-blue','Requested':'b-grey','Not started':'b-grey','Blocked':'b-red','Open':'b-amber','Scoping':'b-grey','Discovery':'b-grey','Review':'b-blue','Draft':'b-grey'};return `<span class="badge ${m[s]||'b-grey'}">${esc(s)}</span>`;}
function reviewFlag(s){const m={'Pending':['rf-review','Needs review'],'Reviewed':['rf-approved','Reviewed'],'Approved':['rf-approved','Approved'],'AI-generated':['rf-ai','AI-generated']};const x=m[s]||['rf-draft',s];return `<span class="review-flag ${x[0]}">${esc(x[1])}</span>`;}
function ring(p,label){return `<div class="score-ring" style="--p:${p};--c:${scoreColor(p)}"><div class="inner"><b>${p}%</b><small>${label||''}</small></div></div>`;}
function bar(p){return `<div class="bar"><i style="width:${Math.min(100,p)}%;background:${scoreColor(p)}"></i></div>`;}

function toast(msg){let t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:500;box-shadow:var(--shadow-lg)';document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
function openModal(title,bodyHtml,footHtml){document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="m-hd"><h3>${title}</h3><button class="x" onclick="closeModal()">&times;</button></div><div class="m-bd">${bodyHtml}</div>${footHtml?`<div class="m-ft">${footHtml}</div>`:''}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}

/* aggregate helpers */
function clientStats(cid){
  const sys=where('ai_systems',x=>x.client_id===cid);
  const ucs=where('use_cases',x=>x.client_id===cid);
  const risks=where('risks',x=>x.client_id===cid);
  const ev=where('evidence',x=>x.client_id===cid);
  const acts=where('actions',x=>x.client_id===cid);
  const ctl=where('controls',x=>x.client_id===cid);
  const asm=where('assessments',x=>x.client_id===cid)[0];
  const annualValue=ucs.reduce((s,u)=>s+u.estimated_financial_value_monthly*12,0);
  const highRisks=risks.filter(r=>r.risk_score>=15).length;
  const openActions=acts.filter(a=>a.status!=='Done').length;
  const overdue=acts.filter(a=>a.status!=='Done'&&daysTo(a.due_date)<0).length;
  const evGaps=ev.filter(e=>e.status==='Requested').length;
  const reviewQ=ev.filter(e=>e.human_review_status==='Pending').length;
  const maturity=asm?asm.readiness_score:0;
  const riskScore=Math.min(100,Math.round(risks.reduce((s,r)=>s+r.risk_score,0)/Math.max(1,risks.length)/25*100));
  return {sys,ucs,risks,ev,acts,ctl,asm,annualValue,highRisks,openActions,overdue,evGaps,reviewQ,maturity,riskScore};
}

function sysScore(sy){
  const map={Low:1,Medium:2,High:3,Full:1,Partial:2,Minimal:3,Assistive:1,Recommends:2,'Acts with approval':3,Autonomous:4};
  const dataSens=(sy.special_category_data_flag?3:0)+(sy.personal_data_flag?2:0)+(sy.customer_data_flag?1:0);
  return {
    value:rnd(2,3),
    dataSens:Math.min(5,dataSens+1),
    autonomy:map[sy.autonomy_level]||2,
    humanImpact:(map[sy.decision_impact_level]||2)+(sy.external_user_impact_flag?1:0),
    regRelevance:sy.high_risk_candidate_flag?5:(map[sy.decision_impact_level]||2),
    govMaturity:rnd(1,3),monMaturity:rnd(1,3)
  };
}

function computeIntake(){const D=INTAKE.data;const flags=D.flags||[];
  // maturity score
  const matMap={'None':10,'Ad-hoc':30,'Some policies':55,'Formal programme':80};
  const maturity=matMap[D.mat]||20;
  // risk score (higher = riskier)
  let risk=20;if(flags.includes('personal'))risk+=10;if(flags.includes('special'))risk+=18;if(flags.includes('children'))risk+=15;if(flags.includes('automated'))risk+=15;if(flags.includes('external'))risk+=10;if(D.reg==='yes')risk+=12;if((D.count||'').match(/15|9-15/))risk+=8;risk=Math.min(98,risk);
  // recommended engagement
  let rec=D.eng;
  if(!rec){
    if(flags.includes('automated')&&(flags.includes('external')||flags.includes('special')))rec='EU AI Act Readiness';
    else if(D.reg==='yes')rec='AI Governance Review';
    else if(maturity<35&&risk>50)rec='AI Governance Review';
    else if(maturity>=55)rec='ISO 42001 Readiness';
    else rec='AI Operating Review';
  }
  const missing=[];if(!D.tools)missing.push('AI tool list');if(!D.uses)missing.push('priority use cases');if(!(D.flags||[]).length)missing.push('data sensitivity confirmation');if(!D.obj)missing.push('success objectives');
  return {maturity,risk,rec,missing,flags};
}

let OPP_SORT='value';
function view_opportunities(){
  const cid=STATE.clientId;let ucs=where('use_cases',u=>u.client_id===cid);
  const annual=u=>u.estimated_financial_value_monthly*12;
  const effortRank={Low:1,Medium:2,High:3};const confRank={High:3,Medium:2,Low:1};
  // priority score = value-weighted by confidence, penalised by effort & governance risk
  const score=u=>Math.round((annual(u)/1000)*confRank[u.confidence_level]/effortRank[u.implementation_effort]);
  ucs=ucs.map(u=>({u,annual:annual(u),score:score(u)}));
  if(OPP_SORT==='value')ucs.sort((a,b)=>b.annual-a.annual);else if(OPP_SORT==='score')ucs.sort((a,b)=>b.score-a.score);else ucs.sort((a,b)=>effortRank[a.u.implementation_effort]-effortRank[b.u.implementation_effort]);
  const totalAnnual=ucs.reduce((s,x)=>s+x.annual,0);
  const totalHours=ucs.reduce((s,x)=>s+x.u.estimated_hours_saved_monthly,0)*12;
  const quickWins=ucs.filter(x=>x.u.implementation_effort==='Low'&&x.u.confidence_level!=='Low');
  return h`
  <div class="note mb">Prevents Amplify from being a generic compliance tool. Value, effort and confidence per use case → ranked opportunities and next-best-actions. <span class="review-flag rf-ai">AI-generated</span> estimates — confirm financial assumptions with the client (review gate).</div>
  <div class="grid g3 mb">
    <div class="kpi"><div class="k-label">Annual value potential</div><div class="k-val">${moneyK(totalAnnual)}</div></div>
    <div class="kpi"><div class="k-label">Hours saved / year</div><div class="k-val">${totalHours.toLocaleString()}</div></div>
    <div class="kpi"><div class="k-label">Quick wins (low effort)</div><div class="k-val">${quickWins.length}</div><div class="k-sub">${moneyK(quickWins.reduce((s,x)=>s+x.annual,0))}/yr</div></div>
  </div>
  <div class="card"><div class="hd"><div><h3>Ranked opportunities</h3><div class="desc">${clientName(cid)}</div></div>
  <div class="flex"><span class="tiny muted">Sort:</span><select class="in" style="width:auto" onchange="OPP_SORT=this.value;navigate('opportunities')"><option value="value" ${OPP_SORT==='value'?'selected':''}>Annual value</option><option value="score" ${OPP_SORT==='score'?'selected':''}>Priority score</option><option value="effort" ${OPP_SORT==='effort'?'selected':''}>Lowest effort</option></select>
  <button class="btn primary sm" onclick="addOpp()">+ Add use case</button></div></div>

// derive coverage from the client's assessment responses + evidence/controls linkage
function reqCoverage(cid){
  const asm=where('assessments',a=>a.client_id===cid)[0];
  const ev=where('evidence',e=>e.client_id===cid);
  const ctl=where('controls',c=>c.client_id===cid);
  const cov={};
  REQUIREMENTS.forEach(rq=>{
    const resp=asm&&asm.responses.find(r=>r.requirement_id===rq.requirement_id);
    const hasEv=ev.some(e=>(e.linked_requirement_ids||[]).includes(rq.requirement_id)&&(e.status==='Approved'||e.status==='Generated'||e.status==='Received'));
    const hasCtl=ctl.some(c=>(c.related_framework_requirements||[]).includes(rq.requirement_id)&&c.implementation_status==='Implemented');
    let state='missing';
    if(resp){if(resp.answer==='Yes'||(hasEv&&hasCtl))state='covered';else if(resp.answer==='Partial'||hasEv||hasCtl)state='partial';}
    else if(hasEv&&hasCtl)state='covered';else if(hasEv||hasCtl)state='partial';
    cov[rq.requirement_id]={state,hasEv,hasCtl};
  });
  return cov;
}
function view_mapping(){
  const cid=STATE.clientId;const cov=reqCoverage(cid);
  const fwStats=DB.frameworks.map(f=>{const reqs=REQUIREMENTS.filter(r=>r.framework_id===f.framework_id);const cot=reqs.filter(r=>cov[r.requirement_id].state==='covered').length;const par=reqs.filter(r=>cov[r.requirement_id].state==='partial').length;const mis=reqs.length-cot-par;const score=Math.round((cot+par*.5)/reqs.length*100);return {f,reqs,cot,par,mis,score};});
  const allMissing=REQUIREMENTS.filter(r=>cov[r.requirement_id].state==='missing');
  return h`

  <div class="grid g3 mb">${fwStats.map(s=>h`<div class="card"><div class="bd"><div class="flex between"><span class="sb">${esc(s.f.framework_name)}</span><span class="badge ${s.score>=70?'b-green':s.score>=40?'b-amber':'b-red'}">${s.score}%</span></div><div class="tiny muted mb">${esc(s.f.version)}</div>${bar(s.score)}<div class="tiny mt8"><span style="color:var(--green)">●</span> ${s.cot} covered &nbsp; <span style="color:var(--amber)">●</span> ${s.par} partial &nbsp; <span style="color:var(--red)">●</span> ${s.mis} missing</div></div></div>`).join('')}</div>

  <div class="card mb"><div class="hd"><div><h3>Requirement coverage matrix</h3><div class="desc">${clientName(cid)} — evidence &amp; control reuse shown per requirement</div></div></div>
  <div class="bd" style="padding:0"><table>
    <thead><tr><th>Framework</th><th>Ref</th><th>Requirement</th><th>Status</th><th>Evidence</th><th>Control</th><th>Reused by</th></tr></thead>
    <tbody>${REQUIREMENTS.map(rq=>{const c=cov[rq.requirement_id];const reuse=MAPPINGS.filter(m=>m.source_framework_requirement_id===rq.requirement_id||m.target_framework_requirement_id===rq.requirement_id).map(m=>{const other=m.source_framework_requirement_id===rq.requirement_id?m.target_framework_requirement_id:m.source_framework_requirement_id;return fwNameOfReq(other);});const uniq=[...new Set(reuse)];return h`<tr>
      <td class="tiny sb">${esc(fwById(rq.framework_id).framework_name)}</td><td class="tiny muted">${esc(rq.requirement_reference)}</td>
      <td>${esc(rq.requirement_title)}<div class="tiny muted">${esc(rq.risk_domain)}</div></td>
      <td>${c.state==='covered'?'<span class="badge b-green">Covered</span>':c.state==='partial'?'<span class="badge b-amber">Partial</span>':'<span class="badge b-red">Missing</span>'}</td>
      <td class="center">${c.hasEv?'✓':'<span class="muted">—</span>'}</td><td class="center">${c.hasCtl?'✓':'<span class="muted">—</span>'}</td>
      <td class="tiny muted">${uniq.length?uniq.join(', '):'—'}</td></tr>`;}).join('')}</tbody>
  </table></div></div>
  ${allMissing.length?h`<div class="card"><div class="hd"><div><h3>Recommended remediation</h3><div class="desc">${allMissing.length} missing requirements — generated next actions</div></div><button class="btn sm" onclick="createGapActions()">+ Create actions from gaps</button></div><div class="bd" style="padding:0"><table><tbody>
    ${allMissing.slice(0,12).map(rq=>h`<tr><td><div class="sb">${esc(rq.requirement_title)} <span class="tiny muted">(${esc(fwById(rq.framework_id).framework_name)} ${esc(rq.requirement_reference)})</span></div><div class="tiny muted">Needs: ${esc(rq.evidence_needed)} · Control: ${esc(rq.control_needed)}</div></td><td class="right"><span class="badge ${rq.priority==='High'?'b-red':'b-amber'}">${esc(rq.priority)}</span></td></tr>`).join('')}
  </tbody></table></div></div>`:''}`;
}

let EUAI={sysId:null,ans:{}};
const EUAI_Q=[
  {id:'prohibited',q:'Does the system use any prohibited practice (social scoring, manipulative techniques, untargeted facial scraping, real-time remote biometric ID in public)?',weight:'prohibited'},

function view_euaiact(){

  const result=cur?classifyEUAI():null;
  return h`
  <div class="note warn mb"><b>Not legal advice.</b> This assistant produces a <b>provisional</b> classification to structure a conversation and flag what needs qualified legal review. Final EU AI Act conclusions must be signed off by a human (review gate). Prompt <code>p_euai v1.1</code>.</div>

function classifyEUAI(){const a=EUAI.ans;const yes=k=>a[k]==='yes';const unsure=k=>a[k]==='unsure'||a[k]===undefined;
  let tier='Minimal risk',badge='b-green';const reasons=[],obligations=[],legal=[],actions=[];
  const provider=yes('role');const roleLabel=provider?'Provider':'Deployer';
  if(yes('prohibited')){tier='Prohibited risk';badge='b-red';reasons.push('A prohibited practice was indicated — these uses are banned under the Act.');legal.push('Confirm whether the practice falls within Article 5 prohibitions.');actions.push('Stop / redesign the use case before any deployment.');}
  else if(yes('biometric')||yes('criticalUse')||yes('safety')||yes('autonomy')){tier='High-risk candidate';badge='b-red';
    if(yes('biometric'))reasons.push('Biometric identification / categorisation / emotion recognition indicated.');
    if(yes('criticalUse'))reasons.push('Used in an Annex III high-risk area (e.g. HR, essential services).');
    if(yes('safety'))reasons.push('Acts as a safety component of a regulated product.');
    if(yes('autonomy'))reasons.push('Drives consequential decisions about people with limited oversight.');
    obligations.push('Risk management system (Art. 9)','Data governance (Art. 10)','Technical documentation (Art. 11)','Logging (Art. 12)','Human oversight (Art. 14)','Accuracy & robustness (Art. 15)');
    if(provider)obligations.push('Conformity assessment','CE marking / registration');else obligations.push('Deployer duties (Art. 26)','Assign human oversight');
    legal.push('Confirm Annex III categorisation and any exemptions.','Confirm provider vs deployer obligations.');
    actions.push('Run ISO 42001 readiness to build the management system.','Stand up human oversight and logging controls.','Complete a fundamental-rights / impact assessment.');}
  else if(yes('interacts')||unsure('interacts')){tier='Limited / transparency risk';badge='b-amber';reasons.push('Interacts with people or generates content — transparency duties apply.');obligations.push('Inform users they are interacting with AI (Art. 50)','Label AI-generated content');actions.push('Add AI transparency notices and disclosure.');}
  else {reasons.push('No high-risk or transparency triggers indicated.');obligations.push('Voluntary codes of conduct');actions.push('Maintain inventory; re-assess if use changes.');}
  if(yes('gpai')){reasons.push('Built on / is a general-purpose AI model — GPAI obligations may also apply.');obligations.push('GPAI transparency & documentation');legal.push('Assess GPAI provider obligations and systemic-risk thresholds.');}
  Object.keys(a).filter(k=>a[k]==='unsure').length&&legal.push('Several answers are "unsure" — resolve these before finalising.');
  return {tier,badge,reasons,obligations,legal,actions,roleLabel};
}

const ISO42_DOMAINS=['Organisational context','AI governance','Leadership & accountability','AI policy','Risk management','Impact assessment','Data governance','Lifecycle management','Supplier management','Monitoring & measurement','Incident management','Internal audit readiness','Management review readiness','Continual improvement'];
function iso42Scores(cid){_rng=mulberry32(hashStr(cid+'iso42'));return ISO42_DOMAINS.map(dn=>({domain:dn,score:rnd(20,90)}));}
function hashStr(s){let h2=0;for(let i=0;i<s.length;i++){h2=(h2<<5)-h2+s.charCodeAt(i);h2|=0;}return Math.abs(h2);}
function view_iso42001(){
  const cid=STATE.clientId;const ds=iso42Scores(cid);const overall=Math.round(ds.reduce((s,x)=>s+x.score,0)/ds.length);
  const gaps=[...ds].sort((a,b)=>a.score-b.score).slice(0,5);
  return h`
  <div class="note mb"><span class="review-flag rf-ai">AI-generated</span> ISO/IEC 42001 AI management system readiness across 14 domains. Conclusions require human review. Prompt <code>p_iso v1.0</code>.</div>
  <div class="grid g4 mb">
    <div class="card"><div class="bd center"><div class="k-label">AIMS readiness</div><div style="margin:10px 0">${ring(overall)}</div>${ragBadge(overall,'Audit-ready','Developing','Early')}</div></div>

    <h2>Proposed scope</h2><p>${esc(ty)} delivered over ${cat.weeks?cat.weeks+' weeks':'an ongoing monthly subscription'} by Teamsmiths, using the Amplify command centre to compress delivery effort.</p>
    <h2>Deliverables</h2><ul>${cat.deliv.map(d=>'<li>'+esc(d)+'</li>').join('')}</ul>
    <h2>Timeline</h2><p>${cat.weeks?'Weeks 1-2 discovery & inventory · weeks 3-4 assessment & risk · remaining weeks remediation, reporting & board readout.':'Monthly cadence with quarterly board updates.'}</p>
    <h2>Investment</h2><p style="font-size:18px"><b>${cat.weeks?money(cat.price):money(cat.price)+' / month'}</b> ${cat.weeks?'(fixed fee)':''}. <span class="meta">Pricing indicative — requires consultant approval.</span></p>
    <h2>Next step</h2><p>Confirm scope and start date; Teamsmiths issues an engagement letter and begins discovery within 5 working days.</p>
  </div>
  <div class="flex mt no-print"><button class="btn" onclick="document.getElementById('propOut').innerHTML=''">Discard</button><button class="btn primary" onclick="toast('Proposal saved to engagement')">Save to engagement</button></div>`;
  document.getElementById('propOut').innerHTML=html;toast(ty+' proposal generated');
}

/* ============================================================
   21. VIEW: AI PROMPTING LAYER (Module 8)
   ============================================================ */
function view_prompts(){
  return h`
  <div class="note mb">Reusable, <b>version-controlled</b> AI prompts power every generated output. Each AI output is stored with prompt version, model, inputs, output and human-review status.</div>
  <div class="card"><div class="bd" style="padding:0"><table>
    <thead><tr><th>Prompt</th><th>Version</th><th>Model</th><th>Purpose</th><th>Output review</th></tr></thead>
    <tbody>${DB.prompts.map(p=>h`<tr><td class="sb">${esc(p.name)}</td><td><span class="badge b-blue">v${esc(p.version)}</span></td><td class="tiny">${esc(p.model)}</td><td class="tiny muted">${esc(p.purpose)}</td><td>${reviewFlag('Pending')}</td></tr>`).join('')}</tbody>
  </table></div></div>
  <div class="note warn mt"><b>Human review gates (always required before client delivery):</b> legal/regulatory conclusions · EU AI Act classification · ISO readiness conclusions · client-facing risk scores · final policies · board reports · audit packs · financial ROI estimates · high-risk remediation · any certification-related claim.</div>`;
}

/* ============================================================
   22. INIT
   ============================================================ */
async function initApp(){await loadDB();navigate('dashboard');}
// Boot: render the right gate, then resume any existing session.
window.addEventListener('DOMContentLoaded',async()=>{
  renderGate();
  // Gate is always the access code. A shared Supabase/platform session must NOT grant entry.
  if(sessionStorage.getItem('ts_amplify_auth')==='1'){showApp();}
});
</script>
